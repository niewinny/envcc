name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: envcc-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: envcc-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: envcc-darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: envcc-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: envcc-win-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p output
          cp target/${{ matrix.target }}/release/envcc output/${{ matrix.binary }}
          chmod +x output/${{ matrix.binary }}

      - name: Prepare binary (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir output
          cp target/${{ matrix.target }}/release/envcc.exe output/${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: output/${{ matrix.binary }}

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: List binaries
        run: ls -lh binaries/

      - name: Make binaries executable
        run: chmod +x binaries/envcc-*

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: latest
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*
          generate_release_notes: true
