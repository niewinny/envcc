name: Build Binaries

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: envcc-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: envcc-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: envcc-darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: envcc-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: envcc-win-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p output
          cp target/${{ matrix.target }}/release/envcc output/${{ matrix.binary }}
          chmod +x output/${{ matrix.binary }}

      - name: Prepare binary (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir output
          cp target/${{ matrix.target }}/release/envcc.exe output/${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: output/${{ matrix.binary }}
